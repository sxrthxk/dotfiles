[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
poll-interval = 5

; Discharge config
label-discharging = %percentage% %
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = ÔĖā
ramp-capacity-1 = ÔēĽ
ramp-capacity-2 = Ôēľ
ramp-capacity-3 = Ôēĺ
ramp-capacity-4 = Ôēł

; Charging config
label-charging = %percentage% %
format-charging = <animation-charging> <label-charging>

animation-charging-0 = ÔēĻ ÔĚÄ
animation-charging-1 = ÔēĽ ÔĮď
animation-charging-2 = Ôēľ ÔĚÄ
animation-charging-3 = Ôēĺ ÔĮď
animation-charging-4 = Ôēł ÔĚÄ
;; Framerate in milliseconds
animation-charging-framerate = 750

label-full = ÔĖÉ %percentage%

